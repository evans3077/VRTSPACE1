services:
  - type: web
    name: vrt-space-agency
    runtime: python
    buildCommand: ./build.sh
    startCommand: bash start.sh
    healthCheckPath: /
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      # DATABASE_URL is set manually in the Render dashboard (point at Neon
      # or Supabase). Do NOT auto-provision Render's free Postgres here —
      # it expires after 90 days, which wipes content on every renewal.
      - key: DATABASE_URL
        sync: false   # value is filled in via the dashboard, not committed
      # Set SEED_DEMO=1 in the dashboard if you want demo users
      # (alex.solo, morgan.lee, sam.rivera) seeded on next deploy.
      - key: SEED_DEMO
        value: "0"
      # Forwarded to the simulator if/when you wire real LLM calls.
      # Leave unset to use the offline simulator.
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # ─── Sentry error tracking ────────────────────────────────────────
      # Paste the DSN from sentry.io (project: Django) into the Render
      # dashboard. Leave unset to disable Sentry entirely (settings.py is
      # a no-op when DSN is missing).
      - key: SENTRY_DSN
        sync: false
      # 0.0–1.0 fraction of transactions sent for performance traces.
      # 0.1 = 10% sampling, plenty for visibility without burning quota.
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
      - key: DJANGO_ENV
        value: "production"
