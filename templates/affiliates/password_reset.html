{% extends "base.html" %}

{% block content %}
<section class="public-shell-section aff-login-section">
    <div class="container auth-shell">

        <div class="auth-intro-card glass-panel">
            <p class="eyebrow">Partner Portal</p>
            <h1>Reset your password.</h1>
            <p class="lead">Enter the email address on your partner account and we'll send you a reset link.</p>
        </div>

        <article class="auth-form-card glass-panel">
            <div class="auth-form-head">
                <p class="eyebrow">Password reset</p>
                <h2>Send reset link</h2>
            </div>

            <form method="post" class="premium-form auth-form" novalidate>
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_email">Email address</label>
                    <input type="email" id="id_email" name="email" autocomplete="email"
                           placeholder="your@email.com" required>
                </div>
                <button type="submit" class="button button-primary button-block">
                    Send reset link <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
                </button>
            </form>

            <p class="auth-assist-text" style="text-align:center;margin-top:1.5rem;">
                <a href="{% url 'affiliates:login' %}">
                    <i class="fa-solid fa-arrow-left" style="font-size:0.72rem;"></i> Back to sign in
                </a>
            </p>
        </article>

    </div>
</section>
{% endblock %}
