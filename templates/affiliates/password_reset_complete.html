{% extends "base.html" %}

{% block content %}
<section class="public-shell-section aff-login-section">
    <div class="container" style="max-width:560px;padding-top:6rem;padding-bottom:6rem;text-align:center;">
        <div class="glass-panel" style="padding:3rem 2.5rem;">
            <i class="fa-solid fa-lock-open" style="font-size:2.5rem;color:var(--brand-primary);margin-bottom:1.5rem;display:block;"></i>
            <p class="eyebrow">Password reset</p>
            <h1 style="font-size:1.75rem;margin-bottom:1rem;">Password updated.</h1>
            <p style="color:var(--text-secondary);line-height:1.6;margin-bottom:2rem;">
                Your new password is set. Sign in to access your partner dashboard.
            </p>
            <a href="{% url 'affiliates:login' %}" class="button button-primary">
                Sign in <i class="fa-solid fa-arrow-right"></i>
            </a>
        </div>
    </div>
</section>
{% endblock %}
