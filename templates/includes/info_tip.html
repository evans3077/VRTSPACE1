<span class="vrt-infotip-wrap">
    <button
        class="vrt-infotip"
        type="button"
        aria-label="What is {{ tip_title }}?"
        data-tip-title="{{ tip_title }}"
        data-tip-body="{{ tip_body }}"
        {% if tip_calc %}data-tip-calc="{{ tip_calc }}"{% endif %}
        {% if tip_link %}data-tip-link="{{ tip_link }}" data-tip-link-text="{{ tip_link_text|default:'Learn more' }}"{% endif %}
    ><i class="fa-solid fa-circle-question" aria-hidden="true"></i></button>
</span>
