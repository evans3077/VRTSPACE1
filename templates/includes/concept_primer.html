<div class="cp-card" id="cp-{{ primer_id }}" role="note" aria-label="Concept: {{ term }}" data-primer-id="{{ primer_id }}">
    <div class="cp-rail" aria-hidden="true"></div>
    <div class="cp-body">
        <div class="cp-head">
            {% if acronym %}<span class="cp-eyebrow">{{ acronym }}</span>{% endif %}
            <strong class="cp-term">{{ term }}</strong>
        </div>
        <p class="cp-def">{{ plain_definition }}</p>
        <p class="cp-why"><span class="cp-why-label">Why it matters</span> {{ why_it_matters }}</p>
        {% if learn_more_url %}
        <a class="cp-link" href="{{ learn_more_url }}">Learn more <i class="fa-solid fa-arrow-right" style="font-size:0.7em;"></i></a>
        {% endif %}
    </div>
    <button class="cp-dismiss" aria-label="Dismiss" title="Dismiss">
        <i class="fa-solid fa-xmark"></i>
    </button>
</div>
