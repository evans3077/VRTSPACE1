<div class="ws-empty-state">
    <div class="ws-empty-icon">
        <i class="{{ es_icon }}" aria-hidden="true"></i>
    </div>
    <p class="ws-empty-title">{{ es_title }}</p>
    <p class="ws-empty-desc">{{ es_desc }}</p>
    {% if es_cta_url %}
    <div style="display: flex; gap: 0.65rem; justify-content: center; flex-wrap: wrap; margin-top: 0.25rem;">
        <a href="{{ es_cta_url }}" class="button button-primary">{{ es_cta_label|default:"Get started" }}</a>
        {% if es_secondary_url %}
        <a href="{{ es_secondary_url }}" class="button button-secondary">{{ es_secondary_label|default:"See a sample" }}</a>
        {% endif %}
    </div>
    {% endif %}
</div>
